<div class="relative flex min-h-screen bg-slate-50">
  <!-- Sidebar -->
  <aside
    class="fixed inset-y-0 left-0 z-30 w-64 flex flex-col border-r-2 border-gray-200 bg-white transform transition-transform duration-300 ease-in-out md:relative md:translate-x-0"
    [class.translate-x-0]="isSidebarOpen()"
    [class.-translate-x-full]="!isSidebarOpen()">
    <div class="flex items-center justify-between p-4 border-b border-gray-200">
      <h2 class="text-xl font-semibold">Project Camp</h2>
      <!-- Close button for mobile -->
      <button (click)="toggleSidebar()" class="p-1 rounded-full md:hidden hover:bg-gray-100">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>
    <nav class="flex-1 p-4 space-y-2">
      <a routerLink="projects" routerLinkActive="bg-gray-200 font-semibold" class="flex items-center p-2 rounded-lg text-gray-600 hover:bg-gray-100 transition-colors">
        <span class="mr-3 text-xl">📁</span>
        <span>Projects</span>
      </a>
      <a routerLink="teams" routerLinkActive="bg-gray-200 font-semibold" class="flex items-center p-2 rounded-lg text-gray-600 hover:bg-gray-100 transition-colors">
        <span class="mr-3 text-xl">👥</span>
        <span>Teams</span>
      </a>
      <a routerLink="tasks" routerLinkActive="bg-gray-200 font-semibold" class="flex items-center p-2 rounded-lg text-gray-600 hover:bg-gray-100 transition-colors">
        <span class="mr-3 text-xl">✔️</span>
        <span>Tasks</span>
      </a>
      <a routerLink="notes" routerLinkActive="bg-gray-200 font-semibold" class="flex items-center p-2 rounded-lg text-gray-600 hover:bg-gray-100 transition-colors">
        <span class="mr-3 text-xl">📝</span>
        <span>Notes</span>
      </a>
      <a (click)="logout()" routerLinkActive="bg-gray-200 font-semibold" class="flex items-center p-2 rounded-lg text-gray-600 hover:bg-gray-100 transition-colors">
        <span class="mr-3 text-xl"></span>
        <span>Logout</span>
      </a>
    </nav>
  </aside>

  <!-- Main Content -->
  <div class="flex-1 flex flex-col md:ml-0 transition-all duration-300 ease-in-out">
    <!-- Header for main content with hamburger menu -->
    <header class="sticky top-0 bg-white/80 backdrop-blur-sm shadow-sm z-20 md:hidden">
      <div class="flex items-center justify-between p-4">
        <button (click)="toggleSidebar()" class="p-1">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
          </svg>
        </button>
        <h2 class="text-xl font-semibold">Project Camp</h2>
      </div>
    </header>
    <main class="flex-1 overflow-y-auto p-4 md:p-8">
      <router-outlet />
    </main>
  </div>
</div>
