<div class="p-8">
  <div class="mx-auto max-w-6xl">
    <div class="mb-8 flex items-center justify-between">
      <div>
        <h1 class="text-4xl font-bold text-slate-950 pt-8">My Dashboard</h1>
        <p class="mt-2 text-slate-600">Manage your projects, tasks, and notes.</p>
      </div>
      <div class="rounded-lg bg-green-50 px-4 py-3">
        <p class="text-sm font-semibold text-green-900">Role: Member</p>
      </div>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
      <!-- My Projects -->
      <a routerLink="projects" class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm shadow-slate-200/40 transition hover:-translate-y-1 hover:shadow-md">
        <div class="mb-4 inline-block rounded-lg bg-blue-50 p-3">
          <span class="text-2xl">📁</span>
        </div>
        <h2 class="text-xl font-semibold text-slate-950">My Projects</h2>
        <p class="mt-2 text-sm text-slate-600">View and manage projects you are part of.</p>
      </a>

      <!-- My Tasks -->
      <a routerLink="tasks" class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm shadow-slate-200/40 transition hover:-translate-y-1 hover:shadow-md">
        <div class="mb-4 inline-block rounded-lg bg-orange-50 p-3">
          <span class="text-2xl">✓</span>
        </div>
        <h2 class="text-xl font-semibold text-slate-950">My Tasks</h2>
        <p class="mt-2 text-sm text-slate-600">Track tasks assigned to you.</p>
      </a>

      <!-- My Notes -->
      <a routerLink="notes" class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm shadow-slate-200/40 transition hover:-translate-y-1 hover:shadow-md">
        <div class="mb-4 inline-block rounded-lg bg-yellow-50 p-3">
          <span class="text-2xl">📝</span>
        </div>
        <h2 class="text-xl font-semibold text-slate-950">My Notes</h2>
        <p class="mt-2 text-sm text-slate-600">Create and organize your notes.</p>
      </a>
    </div>

    <div class="mt-10">
      <h2 class="mb-6 text-2xl font-bold text-slate-950">Quick Actions</h2>
      <div class="grid gap-4 sm:grid-cols-2">
        <button class="rounded-lg border border-slate-200 bg-white px-6 py-4 text-left shadow-sm transition hover:bg-slate-50">
          <p class="font-semibold text-slate-950">Create New Task</p>
          <p class="mt-1 text-sm text-slate-600">Add a new task to your workflow.</p>
        </button>
        <button class="rounded-lg border border-slate-200 bg-white px-6 py-4 text-left shadow-sm transition hover:bg-slate-50">
          <p class="font-semibold text-slate-950">Share Note</p>
          <p class="mt-1 text-sm text-slate-600">Share a note with your team.</p>
        </button>
      </div>
    </div>
  </div>
</div>
