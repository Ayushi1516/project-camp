<div class="min-h-screen bg-slate-50 flex items-center justify-center px-4 py-10 sm:px-6 lg:px-8">
  <div class="w-full max-w-md rounded-3xl bg-white shadow-xl ring-1 ring-slate-200 overflow-hidden">
    <div class="px-8 py-10">
      <div class="mb-10">
        <span class="inline-flex rounded-full bg-blue-100 px-3 py-1 text-sm font-semibold text-blue-700">Project Camp</span>
      </div>
      <h1 class="text-3xl font-bold tracking-tight text-slate-950 sm:text-4xl">Forgot Password</h1>
      <p class="mt-4 text-slate-600">Enter your email and we’ll send a verification code to reset your password.</p>

      <form class="mt-10 space-y-6" [formGroup]="forgotForm" (ngSubmit)="onSubmit()">
        <div>
          <label for="email" class="block text-sm font-medium text-slate-700">Email address</label>
          <div class="mt-2">
            <input id="email" type="email" formControlName="email" required
              class="block w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-slate-900 shadow-sm outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-200" />
          </div>
        </div>

        <div>
          <button type="submit"
            class="inline-flex w-full justify-center rounded-2xl bg-blue-600 px-6 py-3 text-base font-semibold text-white shadow-lg shadow-blue-600/10 transition hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
            Send reset code
          </button>
        </div>
      </form>

      @if(message()) {<p class="mt-6 text-center text-sm text-green-600">{{ message() }}</p>}
      @if(errorMessage()) {<p class="mt-6 text-center text-sm text-red-600">{{ errorMessage() }}</p>}
    </div>
  </div>
</div>
